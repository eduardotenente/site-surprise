<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Sekuya&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/Alien-Stage.css">
    <title>Você!</title>
    <style>
        main {
            background-image: url(../imagens/Mizi.jpg);
            background-position: center center;
        }
    </style>
</head>
<body>
    <main>
    </main>
    <section>
        <h2 class="sekuya-regular">Amo você mais do que pensa, mais do que sente! Vejo o brilho em seus olhos e me sinto em segurança.</h2>
        <div id="botoes">
            <a href="Mizi-Sua.html" target="_self" rel="prev">
                <button id="voltar" class="merriweather">Voltar</button>
            </a>
            <a href="maos.html" target="_self" rel="next">
                <button id="avançar" class="merriweather">Próximo</button>
            </a>
            <audio id="meuAudio" autoplay muted>
                <source src="../audio/ALIEN_STAGE_OFFICAL_MUSIC_-_KARMA_Luka_Hyuna.ver_-_VIVINOS_ALNST_(SkySound.cc).mp3" type="audio/mp3">
            </audio>
        </div>
    </section>

    <script>
        const audio = document.getElementById("meuAudio");
        const inicio = 25;
        const fim = 50;
        audio.addEventListener("loadedmetadata", () => {
        audio.currentTime = inicio

        function controlarFim() {
            if (audio.currentTime >= fim) {
            audio.pause();
            audio.removeEventListener("timeupdate", controlarFim);
            }
        }
        audio.addEventListener("timeupdate", controlarFim);

        // Tenta desmutar depois de iniciar
        audio.muted = false;
        });
    </script>
</body>
</html>
