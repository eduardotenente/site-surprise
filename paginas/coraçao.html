<!DOCTYPE html>
<html lang=pt-br>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Sekuya&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/coraçao.css">
  <title>Coração!</title>
</head>
<body>
    <img src="../imagens/GIF/The Classy Issue.gif" alt="">
    <main>
        <h2 class="sekuya-regular">As chamas em nossos corações nunca irão se apagar! Eu te amo</h2>
    </main>
    <div id="botoes">
        <a href="Menu.html" target="_self" rel="prev">
            <button id="voltar" class="merriweather">Voltar para o Menu</button>
        </a>
    </div>
    <div id="gif">
      <img src="../imagens/GIF/_3.gif" alt="Gatinho dançando" id="gato">
    </div>
    <audio id="meuAudio" autoplay muted>
        <source src="../audio/ALIEN_STAGE_OFFICAL_MUSIC_-_KARMA_Luka_Hyuna.ver_-_VIVINOS_ALNST_(SkySound.cc).mp3" type="audio/mp3">
    </audio>

    <script>
        const audio = document.getElementById("meuAudio");
        const inicio = 100;
        const fim = 300;
        audio.addEventListener("loadedmetadata", () => {
        audio.currentTime = inicio

        function controlarFim() {
            if (audio.currentTime >= fim) {
            audio.pause();
            audio.removeEventListener("timeupdate", controlarFim);
            }
        }
        audio.addEventListener("timeupdate", controlarFim);

        // Tenta desmutar depois de iniciar
        audio.muted = false;
        });
    </script>
</body>
</html>
